<div class="space-y-6 max-w-6xl">
  <div class="flex items-baseline gap-2">
    <h3 class="text-lg font-semibold text-text">{{ value }}</h3>
    <span class="text-sm text-subtle">{{ n }} points</span>
  </div>

  <section>
    <h4 class="text-sm font-medium text-subtle mb-1">Synchronicity</h4>
    <div id="chart-sync" style="height:240px;"></div>
  </section>

  <section>
    <h4 class="text-sm font-medium text-subtle mb-1">Boat speed</h4>
    <div id="chart-speed" style="height:200px;"></div>
  </section>

  <section>
    <h4 class="text-sm font-medium text-subtle mb-1">Gyro magnitude (per sensor)</h4>
    <div id="chart-imu" style="height:300px;"></div>
  </section>

  <section>
    <h4 class="text-sm font-medium text-subtle mb-1">GPS track</h4>
    <div id="map" style="height:360px;" class="rounded border border-border overflow-hidden"></div>
  </section>

  <script>
    (function () {
      function plot(id, spec) {
        var el = document.getElementById(id);
        if (spec) {
          Plotly.newPlot(id, spec.data, spec.layout, {responsive: true, displaylogo: false});
        } else {
          el.innerHTML = '<div class="text-subtle text-sm p-3">no data</div>';
        }
      }
      plot('chart-sync',  {{ sync_json  | safe }});
      plot('chart-speed', {{ speed_json | safe }});
      plot('chart-imu',   {{ imu_json   | safe }});
      if (window.restyleCharts) restyleCharts();

      var track = {{ track_json | safe }};
      var mapEl = document.getElementById('map');
      // Clean up any previous map instance before creating a new one.
      if (window._srowMap) { try { window._srowMap.remove(); } catch (e) {} window._srowMap = null; }
      if (track && window.L) {
        var map = L.map('map', {scrollWheelZoom: true});
        window._srowMap = map;
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19, attribution: '© OpenStreetMap'
        }).addTo(map);
        var line = L.polyline(track.points, {color: '#7aa2f7', weight: 3}).addTo(map);
        map.fitBounds(line.getBounds(), {padding: [20, 20]});
        // The fragment was just swapped in; size it once layout settles.
        requestAnimationFrame(function () { map.invalidateSize(); });
        setTimeout(function () { map.invalidateSize(); }, 200);
      } else {
        mapEl.innerHTML = '<div class="text-subtle text-sm p-3">no GPS track for this interval</div>';
      }
    })();
  </script>
</div>
