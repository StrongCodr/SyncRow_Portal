# SyncRow Portal — nginx reverse proxy for the Panel/Bokeh app.
#
# Deploy: copy to /etc/nginx/sites-available/syncrow, symlink into sites-enabled,
#         replace PORTAL_DOMAIN, `nginx -t && systemctl reload nginx`.
# Then run:  certbot --nginx -d PORTAL_DOMAIN
#         certbot rewrites this file to add `listen 443 ssl` + an HTTP->HTTPS
#         redirect and manages renewal automatically.
#
# The Panel app is served at /app on the backend; we redirect the root to it.
# Panel/Bokeh require WebSocket upgrade headers to be proxied (the live plots
# use a websocket at /app/ws) — that is what the Upgrade/Connection lines do.

server {
    listen 80;
    listen [::]:80;
    server_name PORTAL_DOMAIN;

    # Send bare domain to the app route.
    location = / {
        return 302 /app;
    }

    location / {
        proxy_pass http://127.0.0.1:5006;
        proxy_http_version 1.1;

        # WebSocket upgrade (required for Bokeh server / live updates)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Preserve host + client info so Bokeh builds correct wss:// origins
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
