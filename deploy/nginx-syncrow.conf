# SyncRow Portal — nginx reverse proxy for the Panel/Bokeh app (HTTP seed config).
#
# Installed by bootstrap.sh as the HTTP site; TLS is added afterward (certbot).
# bootstrap also REMOVES the stock `default` site so unmatched hosts (e.g. www
# before the cert covers it) don't fall through to the nginx welcome page.
#
# Both the apex and www are matched here so www never hits the default page.
# The acme-challenge location serves /var/www/certbot for WEBROOT renewal
# (the --nginx renewal authenticator hangs behind this proxy — see DEPLOY.md).
#
# Production end-state (after TLS): apex serves the app, www 301-redirects to the
# apex, and HTTP 301-redirects to HTTPS. See DEPLOY.md "TLS" for the final blocks.
#
# Panel/Bokeh need WebSocket upgrade headers proxied (live plots use /app/ws).

server {
    listen 80;
    listen [::]:80;
    server_name PORTAL_DOMAIN www.PORTAL_DOMAIN;

    # ACME HTTP-01 challenge (webroot renewal) — must precede any redirect.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    # Send bare domain to the app route.
    location = / {
        return 302 /app;
    }

    location / {
        proxy_pass http://127.0.0.1:5006;
        proxy_http_version 1.1;

        # WebSocket upgrade (required for Bokeh server / live updates)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Preserve host + client info so Bokeh builds correct wss:// origins
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
